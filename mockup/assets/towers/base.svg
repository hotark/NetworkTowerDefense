<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Base: 拠点の町 -->
  <!-- 地面（円形台座） -->
  <ellipse cx="24" cy="40" rx="20" ry="5" fill="#0d1f40" opacity="0.5"/>
  <!-- 左の建物 -->
  <rect x="8" y="22" width="10" height="18" fill="#1a3366" stroke="#4488ff" stroke-width="0.8"/>
  <rect x="10" y="25" width="3" height="3" fill="#4488ff" opacity="0.4"/>
  <rect x="14" y="25" width="3" height="3" fill="#4488ff" opacity="0.3"/>
  <rect x="10" y="30" width="3" height="3" fill="#4488ff" opacity="0.35"/>
  <rect x="14" y="30" width="3" height="3" fill="#4488ff" opacity="0.25"/>
  <!-- 左の屋根 -->
  <polygon points="7,22 13,14 19,22" fill="#0d1f40" stroke="#4488ff" stroke-width="0.8"/>
  <!-- 中央の塔（メイン） -->
  <rect x="17" y="12" width="14" height="28" fill="#1a3366" stroke="#4488ff" stroke-width="1"/>
  <rect x="19" y="15" width="4" height="4" fill="#4488ff" opacity="0.4"/>
  <rect x="25" y="15" width="4" height="4" fill="#4488ff" opacity="0.3"/>
  <rect x="19" y="21" width="4" height="4" fill="#4488ff" opacity="0.35"/>
  <rect x="25" y="21" width="4" height="4" fill="#4488ff" opacity="0.25"/>
  <rect x="19" y="27" width="4" height="4" fill="#4488ff" opacity="0.3"/>
  <rect x="25" y="27" width="4" height="4" fill="#4488ff" opacity="0.35"/>
  <!-- 中央の入口 -->
  <rect x="21" y="34" width="6" height="6" rx="1" fill="#0d1f40" stroke="#4488ff" stroke-width="0.6"/>
  <!-- 中央の屋根尖塔 -->
  <polygon points="16,12 24,4 32,12" fill="#0d1f40" stroke="#4488ff" stroke-width="0.8"/>
  <circle cx="24" cy="7" r="1.5" fill="#4488ff" opacity="0.6"/>
  <!-- 右の建物 -->
  <rect x="30" y="26" width="10" height="14" fill="#1a3366" stroke="#4488ff" stroke-width="0.8"/>
  <rect x="32" y="29" width="3" height="3" fill="#4488ff" opacity="0.3"/>
  <rect x="36" y="29" width="3" height="3" fill="#4488ff" opacity="0.4"/>
  <rect x="32" y="34" width="3" height="3" fill="#4488ff" opacity="0.25"/>
  <!-- 右の屋根 -->
  <polygon points="29,26 35,20 41,26" fill="#0d1f40" stroke="#4488ff" stroke-width="0.8"/>
  <!-- シールド光 -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#4488ff" stroke-width="0.4" opacity="0.15"/>
</svg>
