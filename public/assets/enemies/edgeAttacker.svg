  <line x1="24" y1="12" x2="24" y2="20" stroke="#44bbff" stroke-width="1" opacity="0.6"/>
  <line x1="24" y1="28" x2="24" y2="36" stroke="#44bbff" stroke-width="1" opacity="0.6"/>
  <!-- エネルギーノード -->
  <circle cx="24" cy="10" r="1.5" fill="#44bbff" opacity="0.8"/>
  <circle cx="24" cy="38" r="1.5" fill="#44bbff" opacity="0.8"/>
</svg>
