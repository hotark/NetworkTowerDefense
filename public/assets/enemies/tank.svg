<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Tank: 重装甲艦 - 茶/オレンジ系（四角く頑丈） -->
  <!-- メイン船体（がっしり四角） -->
  <rect x="8" y="6" width="32" height="36" rx="4" fill="#cc8833" stroke="#ffaa44" stroke-width="1.5"/>
  <!-- 装甲プレート -->
  <rect x="10" y="8" width="28" height="10" rx="2" fill="#aa7028" stroke="#ffaa44" stroke-width="0.8"/>
  <rect x="10" y="30" width="28" height="10" rx="2" fill="#aa7028" stroke="#ffaa44" stroke-width="0.8"/>
  <!-- 左右増加装甲 -->
  <rect x="2" y="14" width="8" height="20" rx="2" fill="#996622" stroke="#ffaa44" stroke-width="1"/>
  <rect x="38" y="14" width="8" height="20" rx="2" fill="#996622" stroke="#ffaa44" stroke-width="1"/>
  <!-- 中央ブリッジ -->
  <rect x="16" y="18" width="16" height="12" rx="2" fill="#885520" stroke="#ffaa44" stroke-width="1.2"/>
  <rect x="19" y="20" width="10" height="8" rx="1" fill="#ffaa44" opacity="0.3"/>
  <!-- 前方センサー -->
  <circle cx="24" cy="10" r="2.5" fill="#664418" stroke="#ffaa44" stroke-width="1"/>
  <circle cx="24" cy="10" r="1" fill="#ffaa44" opacity="0.7"/>
  <!-- エンジン（大型2基） -->
  <rect x="12" y="42" width="10" height="4" rx="2" fill="#ffaa44" opacity="0.6"/>
  <rect x="26" y="42" width="10" height="4" rx="2" fill="#ffaa44" opacity="0.6"/>
</svg>
