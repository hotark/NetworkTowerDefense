<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- TowerAttacker: 対施設爆撃機 - ピンク系（六角形） -->
  <!-- メイン船体（六角形） -->
  <path d="M24 4 L40 14 L40 34 L24 44 L8 34 L8 14 Z" fill="#cc3399" stroke="#ff44bb" stroke-width="1.5"/>
  <!-- 内部六角 -->
  <path d="M24 10 L34 17 L34 31 L24 38 L14 31 L14 17 Z" fill="#aa2880" stroke="#ff44bb" stroke-width="0.8"/>
  <!-- 爆撃ベイ（前方2門） -->
  <rect x="14" y="4" width="4" height="10" rx="1" fill="#992266" stroke="#ff44bb" stroke-width="0.8"/>
  <rect x="30" y="4" width="4" height="10" rx="1" fill="#992266" stroke="#ff44bb" stroke-width="0.8"/>
  <!-- マズル -->
  <rect x="14" y="2" width="4" height="3" rx="1" fill="#ff44bb" opacity="0.8"/>
  <rect x="30" y="2" width="4" height="3" rx="1" fill="#ff44bb" opacity="0.8"/>
  <!-- 中央ターゲティングシステム -->
  <circle cx="24" cy="24" r="6" fill="#881a55" stroke="#ff44bb" stroke-width="1.2"/>
  <circle cx="24" cy="24" r="3" fill="#ff44bb" opacity="0.4"/>
  <line x1="18" y1="24" x2="30" y2="24" stroke="#ff44bb" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="18" x2="24" y2="30" stroke="#ff44bb" stroke-width="0.8" opacity="0.6"/>
  <!-- サイドスラスター -->
  <path d="M8 14 L4 12 L4 18 L8 16 Z" fill="#ff44bb" opacity="0.5"/>
  <path d="M40 14 L44 12 L44 18 L40 16 Z" fill="#ff44bb" opacity="0.5"/>
  <!-- エンジン -->
  <rect x="16" y="44" width="6" height="3" rx="1" fill="#ff44bb" opacity="0.6"/>
  <rect x="26" y="44" width="6" height="3" rx="1" fill="#ff44bb" opacity="0.6"/>
</svg>
