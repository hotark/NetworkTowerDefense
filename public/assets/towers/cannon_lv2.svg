  <rect x="19" y="4" width="10" height="3" rx="1.5" fill="#cc44ff" opacity="0.7"/>
  <!-- 胴体 -->
  <path d="M12 20 L36 20 L40 30 L36 44 L12 44 L8 30 Z" fill="#2a1133" stroke="#cc44ff" stroke-width="1.2"/>
  <!-- コア（少し明るい） -->
  <circle cx="24" cy="32" r="5.5" fill="#1a0822" stroke="#cc44ff" stroke-width="1.2"/>
  <circle cx="24" cy="32" r="3" fill="#cc44ff" opacity="0.35"/>
  <circle cx="24" cy="32" r="1.2" fill="#ee88ff" opacity="0.5"/>
  <!-- チャージインジケーター（薄い） -->
