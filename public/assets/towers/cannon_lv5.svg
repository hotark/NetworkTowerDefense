<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cannon Lv5: 究極重砲 - マルチバレル+フルアーマー+二重コア -->
  <!-- 外殻リング -->
  <circle cx="24" cy="28" r="22" fill="none" stroke="#cc44ff" stroke-width="0.6" opacity="0.25"/>
  <!-- メイン砲身（最大） -->
  <rect x="18" y="0" width="12" height="22" rx="2.5" fill="#3a1144" stroke="#cc44ff" stroke-width="2"/>
  <rect x="16" y="0" width="16" height="5" rx="2.5" fill="#cc44ff" opacity="0.8"/>
  <rect x="19" y="0" width="10" height="2" fill="#ee88ff" opacity="0.6"/>
  <!-- サイド砲身 -->
  <rect x="10" y="3" width="5" height="16" rx="1.5" fill="#2a0d33" stroke="#cc44ff" stroke-width="1"/>
  <rect x="33" y="3" width="5" height="16" rx="1.5" fill="#2a0d33" stroke="#cc44ff" stroke-width="1"/>
  <rect x="9" y="2" width="7" height="3" rx="1" fill="#cc44ff" opacity="0.7"/>
  <rect x="32" y="2" width="7" height="3" rx="1" fill="#cc44ff" opacity="0.7"/>
  <!-- 船体（最大） -->
  <path d="M6 20 L42 20 L46 32 L42 46 L6 46 L2 32 Z" fill="#2a1133" stroke="#cc44ff" stroke-width="2.5"/>
  <!-- フル装甲 -->
  <path d="M2 28 L0 26 L0 40 L2 42 Z" fill="#3a1844" stroke="#cc44ff" stroke-width="1.2"/>
  <path d="M46 28 L48 26 L48 40 L46 42 Z" fill="#3a1844" stroke="#cc44ff" stroke-width="1.2"/>
  <path d="M8 24 L4 26 L4 36 L8 38 Z" fill="#3a1844" stroke="#cc44ff" stroke-width="0.8"/>
  <path d="M40 24 L44 26 L44 36 L40 38 Z" fill="#3a1844" stroke="#cc44ff" stroke-width="0.8"/>
  <!-- 二重パワーコア -->
  <circle cx="24" cy="33" r="10" fill="#1a0822" stroke="#cc44ff" stroke-width="2"/>
  <circle cx="24" cy="33" r="7" fill="none" stroke="#cc44ff" stroke-width="1" opacity="0.5"/>
  <circle cx="24" cy="33" r="5" fill="#cc44ff" opacity="0.4"/>
  <circle cx="24" cy="33" r="3" fill="#ee88ff" opacity="0.7"/>
  <circle cx="24" cy="33" r="1.5" fill="#ffffff" opacity="0.8"/>
  <!-- チャージインジケーター（3本） -->
  <rect x="10" y="24" width="28" height="2" rx="1" fill="#cc44ff" opacity="0.5"/>
  <rect x="12" y="28" width="24" height="1.5" rx="0.8" fill="#cc44ff" opacity="0.4"/>
  <!-- エンジン（三連） -->
  <rect x="10" y="44" width="6" height="3" rx="1" fill="#cc44ff" opacity="0.7"/>
  <rect x="21" y="44" width="6" height="3" rx="1" fill="#cc44ff" opacity="0.5"/>
  <rect x="32" y="44" width="6" height="3" rx="1" fill="#cc44ff" opacity="0.7"/>
</svg>
