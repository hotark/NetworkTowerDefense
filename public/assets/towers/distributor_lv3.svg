  <path d="M12 24 L4 20 L4 28 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M36 24 L44 20 L44 28 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
