  <line x1="24" y1="20" x2="24" y2="16" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
  <line x1="18" y1="26" x2="12" y2="26" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
  <line x1="30" y1="26" x2="36" y2="26" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
  <line x1="24" y1="32" x2="24" y2="38" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
  <!-- 中央ドット -->
  <circle cx="24" cy="26" r="2.5" fill="#ffaa00" opacity="0.6"/>
  <circle cx="24" cy="26" r="1" fill="#ffddaa"/>
