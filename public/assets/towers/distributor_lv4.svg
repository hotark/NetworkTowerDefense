<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Distributor Lv4: 5方向ポート+ダブルコア+斜めライン -->
  <!-- 船体（大型） -->
  <path d="M16 8 L32 8 L38 16 L38 38 L32 46 L16 46 L10 38 L10 16 Z" fill="#332a00" stroke="#ffaa00" stroke-width="2"/>
  <!-- 入力ポート（上、大型） -->
  <rect x="18" y="3" width="12" height="7" rx="2" fill="#443500" stroke="#ffaa00" stroke-width="1.2"/>
  <rect x="21" y="1" width="6" height="3.5" rx="1" fill="#ffaa00" opacity="0.8"/>
  <!-- 5方向出力ポート -->
  <path d="M10 22 L2 18 L2 28 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M38 22 L46 18 L46 28 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M24 46 L19 48 L29 48 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M12 38 L6 42 L10 46 Z" fill="#443500" stroke="#ffaa00" stroke-width="0.8" opacity="0.7"/>
  <path d="M36 38 L42 42 L38 46 Z" fill="#443500" stroke="#ffaa00" stroke-width="0.8" opacity="0.7"/>
  <!-- ダブル分配コア -->
  <circle cx="24" cy="26" r="8" fill="#221800" stroke="#ffaa00" stroke-width="1.8"/>
  <circle cx="24" cy="26" r="5.5" fill="none" stroke="#ffaa00" stroke-width="0.8" opacity="0.5"/>
  <circle cx="24" cy="26" r="3.5" fill="#ffaa00" opacity="0.5"/>
  <circle cx="24" cy="26" r="2" fill="#ffdd88" opacity="0.8"/>
  <circle cx="24" cy="26" r="0.8" fill="#ffffff" opacity="0.5"/>
  <!-- 6方向ライン -->
  <line x1="24" y1="18" x2="24" y2="12" stroke="#ffaa00" stroke-width="1.8" opacity="0.8"/>
  <line x1="24" y1="34" x2="24" y2="40" stroke="#ffaa00" stroke-width="1.8" opacity="0.8"/>
  <line x1="16" y1="26" x2="10" y2="26" stroke="#ffaa00" stroke-width="1.8" opacity="0.8"/>
  <line x1="32" y1="26" x2="38" y2="26" stroke="#ffaa00" stroke-width="1.8" opacity="0.8"/>
  <line x1="18" y1="20" x2="14" y2="16" stroke="#ffaa00" stroke-width="1.2" opacity="0.6"/>
  <line x1="30" y1="20" x2="34" y2="16" stroke="#ffaa00" stroke-width="1.2" opacity="0.6"/>
  <!-- 外周ドット（4方向） -->
  <circle cx="24" cy="12" r="1.5" fill="#ffaa00" opacity="0.6"/>
  <circle cx="10" cy="26" r="1.5" fill="#ffaa00" opacity="0.6"/>
  <circle cx="38" cy="26" r="1.5" fill="#ffaa00" opacity="0.6"/>
  <circle cx="24" cy="40" r="1.5" fill="#ffaa00" opacity="0.6"/>
</svg>
