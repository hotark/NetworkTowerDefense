<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Distributor Lv5: 究極分配ハブ - 8ポート+二重コア -->
  <!-- 外殻リング -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#ffaa00" stroke-width="0.6" opacity="0.25"/>
  <!-- 船体（最大） -->
  <path d="M14 6 L34 6 L40 16 L40 38 L34 46 L14 46 L8 38 L8 16 Z" fill="#332a00" stroke="#ffaa00" stroke-width="2.5"/>
  <!-- 入力ポート（上、最大） -->
  <rect x="16" y="2" width="16" height="7" rx="2" fill="#443500" stroke="#ffaa00" stroke-width="1.5"/>
  <rect x="20" y="0" width="8" height="4" rx="1.5" fill="#ffaa00"/>
  <!-- 8方向出力ポート -->
  <path d="M8 18 L0 14 L0 26 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M40 18 L48 14 L48 26 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M24 46 L18 48 L30 48 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M10 38 L4 42 L8 46 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M38 38 L44 42 L40 46 Z" fill="#443500" stroke="#ffaa00" stroke-width="1"/>
  <path d="M10 16 L4 10 L8 8 Z" fill="#443500" stroke="#ffaa00" stroke-width="0.8"/>
  <path d="M38 16 L44 10 L40 8 Z" fill="#443500" stroke="#ffaa00" stroke-width="0.8"/>
  <!-- 二重分配コア -->
  <circle cx="24" cy="24" r="9" fill="#221800" stroke="#ffaa00" stroke-width="2"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="#ffaa00" stroke-width="1" opacity="0.5"/>
  <circle cx="24" cy="24" r="4" fill="#ffaa00" opacity="0.5"/>
  <circle cx="24" cy="24" r="2.5" fill="#ffdd88" opacity="0.8"/>
  <circle cx="24" cy="24" r="1" fill="#ffffff" opacity="0.6"/>
  <!-- 8方向ライン -->
  <line x1="24" y1="15" x2="24" y2="10" stroke="#ffaa00" stroke-width="2" opacity="0.9"/>
  <line x1="24" y1="33" x2="24" y2="40" stroke="#ffaa00" stroke-width="2" opacity="0.9"/>
  <line x1="15" y1="24" x2="8" y2="24" stroke="#ffaa00" stroke-width="2" opacity="0.9"/>
  <line x1="33" y1="24" x2="40" y2="24" stroke="#ffaa00" stroke-width="2" opacity="0.9"/>
  <line x1="18" y1="18" x2="12" y2="12" stroke="#ffaa00" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="18" x2="36" y2="12" stroke="#ffaa00" stroke-width="1.5" opacity="0.7"/>
  <line x1="18" y1="30" x2="12" y2="36" stroke="#ffaa00" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="30" x2="36" y2="36" stroke="#ffaa00" stroke-width="1.5" opacity="0.7"/>
  <!-- 外周ドット -->
  <circle cx="24" cy="10" r="2" fill="#ffaa00" opacity="0.7"/>
  <circle cx="8" cy="24" r="2" fill="#ffaa00" opacity="0.7"/>
  <circle cx="40" cy="24" r="2" fill="#ffaa00" opacity="0.7"/>
  <circle cx="24" cy="40" r="2" fill="#ffaa00" opacity="0.7"/>
  <circle cx="12" cy="12" r="1.5" fill="#ffaa00" opacity="0.5"/>
  <circle cx="36" cy="12" r="1.5" fill="#ffaa00" opacity="0.5"/>
  <circle cx="12" cy="36" r="1.5" fill="#ffaa00" opacity="0.5"/>
  <circle cx="36" cy="36" r="1.5" fill="#ffaa00" opacity="0.5"/>
</svg>
