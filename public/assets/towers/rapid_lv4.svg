<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Rapid Lv4: 4連バレル+フルフィン+弾帯 -->
  <!-- 4連バレル -->
  <rect x="14" y="5" width="3" height="15" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <rect x="20" y="3" width="3" height="17" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <rect x="26" y="3" width="3" height="17" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <rect x="32" y="5" width="3" height="15" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <!-- マズル -->
  <rect x="13" y="4" width="5" height="2" rx="1" fill="#ff8800"/>
  <rect x="19" y="2" width="5" height="2" rx="1" fill="#ff8800"/>
  <rect x="25" y="2" width="5" height="2" rx="1" fill="#ff8800"/>
  <rect x="31" y="4" width="5" height="2" rx="1" fill="#ff8800"/>
  <!-- バレルバンド -->
  <rect x="14" y="12" width="21" height="1.5" rx="0.5" fill="#664400" stroke="#ff8800" stroke-width="0.5"/>
  <!-- 船体（大き目） -->
  <path d="M12 19 L36 19 L40 29 L38 44 L10 44 L8 29 Z" fill="#332200" stroke="#ff8800" stroke-width="2"/>
  <!-- センターコア（ダブル） -->
  <circle cx="24" cy="30" r="6" fill="#442800" stroke="#ff8800" stroke-width="1.5"/>
  <circle cx="24" cy="30" r="3.5" fill="#ff8800" opacity="0.5"/>
  <circle cx="24" cy="30" r="1.5" fill="#ffcc66" opacity="0.8"/>
  <!-- 弾帯（3本） -->
  <rect x="12" y="35" width="24" height="2" rx="1" fill="#ff8800" opacity="0.5"/>
  <rect x="14" y="39" width="20" height="2" rx="1" fill="#ff8800" opacity="0.4"/>
  <!-- フルフィン -->
  <path d="M8 26 L2 30 L3 40 L10 38 Z" fill="#443000" stroke="#ff8800" stroke-width="1"/>
  <path d="M40 26 L46 30 L45 40 L38 38 Z" fill="#443000" stroke="#ff8800" stroke-width="1"/>
  <!-- 排熱口 -->
  <rect x="8" y="22" width="2" height="6" rx="0.8" fill="#ff8800" opacity="0.4"/>
  <rect x="38" y="22" width="2" height="6" rx="0.8" fill="#ff8800" opacity="0.4"/>
</svg>
