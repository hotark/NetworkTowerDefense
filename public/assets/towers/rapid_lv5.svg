<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Rapid Lv5: 究極連射 - 6連バレル+フル弾帯+ガトリング感 -->
  <!-- 外殻リング -->
  <circle cx="24" cy="28" r="22" fill="none" stroke="#ff8800" stroke-width="0.6" opacity="0.25"/>
  <!-- 6連バレル（ガトリング配置） -->
  <rect x="11" y="5" width="2.5" height="15" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <rect x="16" y="3" width="2.5" height="17" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <rect x="21" y="1" width="3" height="19" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="1"/>
  <rect x="25" y="1" width="3" height="19" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="1"/>
  <rect x="30" y="3" width="2.5" height="17" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <rect x="35" y="5" width="2.5" height="15" rx="0.8" fill="#553300" stroke="#ff8800" stroke-width="0.8"/>
  <!-- マズル -->
  <rect x="10" y="4" width="4" height="2" rx="1" fill="#ff8800"/>
  <rect x="15" y="2" width="4" height="2" rx="1" fill="#ff8800"/>
  <rect x="20" y="0" width="4" height="2" rx="1" fill="#ffaa44"/>
  <rect x="24" y="0" width="4" height="2" rx="1" fill="#ffaa44"/>
  <rect x="29" y="2" width="4" height="2" rx="1" fill="#ff8800"/>
  <rect x="34" y="4" width="4" height="2" rx="1" fill="#ff8800"/>
  <!-- バレルバンド -->
  <rect x="12" y="10" width="24" height="2" rx="0.5" fill="#664400" stroke="#ff8800" stroke-width="0.5"/>
  <rect x="12" y="16" width="24" height="2" rx="0.5" fill="#664400" stroke="#ff8800" stroke-width="0.5"/>
  <!-- 船体（最大強化） -->
  <path d="M10 20 L38 20 L42 30 L40 46 L8 46 L6 30 Z" fill="#332200" stroke="#ff8800" stroke-width="2.5"/>
  <!-- センターコア -->
  <circle cx="24" cy="30" r="7" fill="#442800" stroke="#ff8800" stroke-width="2"/>
  <circle cx="24" cy="30" r="4.5" fill="#ff8800" opacity="0.5"/>
  <circle cx="24" cy="30" r="2.5" fill="#ffcc66" opacity="0.9"/>
  <circle cx="24" cy="30" r="1" fill="#ffffff" opacity="0.6"/>
  <!-- 弾帯（4本） -->
  <rect x="10" y="34" width="28" height="2" rx="1" fill="#ff8800" opacity="0.6"/>
  <rect x="12" y="38" width="24" height="2" rx="1" fill="#ff8800" opacity="0.5"/>
  <rect x="14" y="42" width="20" height="2" rx="1" fill="#ff8800" opacity="0.4"/>
  <!-- フルフィン -->
  <path d="M6 26 L0 30 L1 42 L8 40 Z" fill="#443000" stroke="#ff8800" stroke-width="1.2"/>
  <path d="M42 26 L48 30 L47 42 L40 40 Z" fill="#443000" stroke="#ff8800" stroke-width="1.2"/>
  <!-- 排熱口（左右） -->
  <rect x="7" y="22" width="2.5" height="8" rx="1" fill="#ff8800" opacity="0.5"/>
  <rect x="39" y="22" width="2.5" height="8" rx="1" fill="#ff8800" opacity="0.5"/>
</svg>
