<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Repeater Lv2: 2段コイル+小パネル -->
  <!-- 船体（やや太め） -->
  <path d="M20 7 L28 7 L33 14 L33 38 L28 45 L20 45 L15 38 L15 14 Z" fill="#0a2233" stroke="#44bbff" stroke-width="1.4"/>
  <!-- 入力ポート（下） -->
  <path d="M21 45 L24 47 L27 45" fill="none" stroke="#44bbff" stroke-width="1.5" opacity="0.5"/>
  <!-- 出力ポート（上向き矢印） -->
  <path d="M19 9 L24 3 L29 9" fill="none" stroke="#44bbff" stroke-width="1.8" opacity="0.7"/>
  <!-- 増幅コイル（2段） -->
  <ellipse cx="24" cy="18" rx="8" ry="3" fill="none" stroke="#44bbff" stroke-width="0.8" opacity="0.45"/>
  <ellipse cx="24" cy="30" rx="8" ry="3" fill="none" stroke="#44bbff" stroke-width="0.8" opacity="0.45"/>
  <!-- コア（少し大きい） -->
  <circle cx="24" cy="24" r="4.5" fill="#0a1a2a" stroke="#44bbff" stroke-width="1.4"/>
  <circle cx="24" cy="24" r="2.5" fill="#44bbff" opacity="0.45"/>
  <circle cx="24" cy="24" r="1" fill="#aaddff" opacity="0.7"/>
  <!-- 増幅ライン -->
  <line x1="24" y1="19" x2="24" y2="12" stroke="#44bbff" stroke-width="1.2" opacity="0.6"/>
  <line x1="24" y1="29" x2="24" y2="36" stroke="#44bbff" stroke-width="0.8" opacity="0.35"/>
  <!-- 小共鳴パネル -->
  <rect x="11" y="21" width="2.5" height="6" rx="0.8" fill="#0d2a3a" stroke="#44bbff" stroke-width="0.6" opacity="0.5"/>
  <rect x="35" y="21" width="2.5" height="6" rx="0.8" fill="#0d2a3a" stroke="#44bbff" stroke-width="0.6" opacity="0.5"/>
</svg>
