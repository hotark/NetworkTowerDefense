<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Repeater Lv3: 標準型 - 水色系 -->
  <!-- 船体（縦長シールド型） -->
  <path d="M20 6 L28 6 L34 14 L34 38 L28 46 L20 46 L14 38 L14 14 Z" fill="#0a2233" stroke="#44bbff" stroke-width="1.5"/>
  <!-- 入力ポート（下） -->
  <path d="M20 46 L24 48 L28 46" fill="none" stroke="#44bbff" stroke-width="1.5" opacity="0.6"/>
  <!-- 出力ポート（上、増幅を示す拡大矢印） -->
  <path d="M18 6 L24 0 L30 6" fill="none" stroke="#44bbff" stroke-width="2" opacity="0.9"/>
  <!-- 増幅コイル（3段） -->
  <ellipse cx="24" cy="16" rx="8" ry="3" fill="none" stroke="#44bbff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="24" cy="24" rx="10" ry="3.5" fill="none" stroke="#44bbff" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="24" cy="32" rx="8" ry="3" fill="none" stroke="#44bbff" stroke-width="1" opacity="0.5"/>
  <!-- 中央増幅コア -->
  <circle cx="24" cy="24" r="5" fill="#0a1a2a" stroke="#44bbff" stroke-width="1.5"/>
  <circle cx="24" cy="24" r="3" fill="#44bbff" opacity="0.5"/>
  <circle cx="24" cy="24" r="1.5" fill="#aaddff"/>
  <!-- 増幅エネルギーライン（上向き＝増幅方向） -->
  <line x1="24" y1="19" x2="24" y2="12" stroke="#44bbff" stroke-width="1.5" opacity="0.8"/>
  <line x1="24" y1="29" x2="24" y2="36" stroke="#44bbff" stroke-width="1" opacity="0.4"/>
  <!-- 左右共鳴パネル -->
  <rect x="10" y="20" width="3" height="8" rx="1" fill="#0d2a3a" stroke="#44bbff" stroke-width="0.8" opacity="0.6"/>
  <rect x="35" y="20" width="3" height="8" rx="1" fill="#0d2a3a" stroke="#44bbff" stroke-width="0.8" opacity="0.6"/>
</svg>
