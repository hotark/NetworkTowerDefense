<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Repeater Lv4: 4段コイル+ダブルコア+大パネル -->
  <!-- 船体（大型） -->
  <path d="M18 4 L30 4 L36 12 L36 40 L30 46 L18 46 L12 40 L12 12 Z" fill="#0a2233" stroke="#44bbff" stroke-width="2"/>
  <!-- 入力ポート（下、大型） -->
  <path d="M19 46 L24 48 L29 46" fill="none" stroke="#44bbff" stroke-width="2" opacity="0.7"/>
  <!-- 出力ポート（上、大型矢印） -->
  <path d="M15 6 L24 0 L33 6" fill="none" stroke="#44bbff" stroke-width="2.5" opacity="0.85"/>
  <path d="M19 8 L24 3 L29 8" fill="none" stroke="#44bbff" stroke-width="1.2" opacity="0.5"/>
  <!-- 増幅コイル（4段、段階的に大きく） -->
  <ellipse cx="24" cy="36" rx="7" ry="2.5" fill="none" stroke="#44bbff" stroke-width="0.8" opacity="0.35"/>
  <ellipse cx="24" cy="30" rx="9" ry="3" fill="none" stroke="#44bbff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="24" cy="24" rx="12" ry="4" fill="none" stroke="#44bbff" stroke-width="1.3" opacity="0.8"/>
  <ellipse cx="24" cy="16" rx="9" ry="3" fill="none" stroke="#44bbff" stroke-width="1" opacity="0.5"/>
  <!-- ダブル増幅コア -->
  <circle cx="24" cy="24" r="6" fill="#0a1a2a" stroke="#44bbff" stroke-width="1.8"/>
  <circle cx="24" cy="24" r="4" fill="none" stroke="#44bbff" stroke-width="0.8" opacity="0.5"/>
  <circle cx="24" cy="24" r="3.5" fill="#44bbff" opacity="0.5"/>
  <circle cx="24" cy="24" r="2" fill="#aaddff" opacity="0.8"/>
  <circle cx="24" cy="24" r="0.8" fill="#ffffff"/>
  <!-- 増幅ライン（太め） -->
  <line x1="24" y1="18" x2="24" y2="8" stroke="#44bbff" stroke-width="2" opacity="0.8"/>
  <line x1="24" y1="30" x2="24" y2="40" stroke="#44bbff" stroke-width="1.2" opacity="0.35"/>
  <!-- 大共鳴パネル -->
  <rect x="8" y="18" width="3.5" height="12" rx="1.5" fill="#0d2a3a" stroke="#44bbff" stroke-width="1" opacity="0.7"/>
  <rect x="37" y="18" width="3.5" height="12" rx="1.5" fill="#0d2a3a" stroke="#44bbff" stroke-width="1" opacity="0.7"/>
  <!-- 共鳴ライン -->
  <line x1="12" y1="24" x2="8" y2="24" stroke="#44bbff" stroke-width="1.2" opacity="0.5"/>
  <line x1="36" y1="24" x2="40" y2="24" stroke="#44bbff" stroke-width="1.2" opacity="0.5"/>
</svg>
