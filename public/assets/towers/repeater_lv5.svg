<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Repeater Lv5: 究極増幅器 - 5段コイル+二重コア+フルパネル -->
  <!-- 外殻リング -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#44bbff" stroke-width="0.6" opacity="0.25"/>
  <!-- 船体（最大） -->
  <path d="M16 3 L32 3 L38 11 L38 41 L32 47 L16 47 L10 41 L10 11 Z" fill="#0a2233" stroke="#44bbff" stroke-width="2.5"/>
  <!-- 入力ポート（下、最大） -->
  <path d="M18 47 L24 48 L30 47" fill="none" stroke="#44bbff" stroke-width="2.5" opacity="0.8"/>
  <!-- 出力ポート（上、大型矢印） -->
  <path d="M14 5 L24 0 L34 5" fill="none" stroke="#44bbff" stroke-width="3" opacity="0.9"/>
  <path d="M18 7 L24 2 L30 7" fill="none" stroke="#44bbff" stroke-width="1.5" opacity="0.6"/>
  <!-- 増幅コイル（5段、入力→出力で段階的に大きく） -->
  <ellipse cx="24" cy="38" rx="7" ry="2.5" fill="none" stroke="#44bbff" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="24" cy="32" rx="9" ry="3" fill="none" stroke="#44bbff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="24" cy="24" rx="13" ry="4.5" fill="none" stroke="#44bbff" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="24" cy="16" rx="10" ry="3.5" fill="none" stroke="#44bbff" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="24" cy="10" rx="8" ry="2.5" fill="none" stroke="#44bbff" stroke-width="1" opacity="0.4"/>
  <!-- 二重増幅コア -->
  <circle cx="24" cy="24" r="7" fill="#0a1a2a" stroke="#44bbff" stroke-width="2"/>
  <circle cx="24" cy="24" r="5" fill="none" stroke="#44bbff" stroke-width="1" opacity="0.5"/>
  <circle cx="24" cy="24" r="4" fill="#44bbff" opacity="0.5"/>
  <circle cx="24" cy="24" r="2.5" fill="#aaddff" opacity="0.9"/>
  <circle cx="24" cy="24" r="1" fill="#ffffff"/>
  <!-- 増幅ライン -->
  <line x1="24" y1="17" x2="24" y2="7" stroke="#44bbff" stroke-width="2.5" opacity="0.9"/>
  <line x1="24" y1="31" x2="24" y2="41" stroke="#44bbff" stroke-width="1.5" opacity="0.4"/>
  <!-- フル共鳴パネル -->
  <rect x="6" y="16" width="4" height="16" rx="2" fill="#0d2a3a" stroke="#44bbff" stroke-width="1.2" opacity="0.8"/>
  <rect x="38" y="16" width="4" height="16" rx="2" fill="#0d2a3a" stroke="#44bbff" stroke-width="1.2" opacity="0.8"/>
  <!-- 追加共鳴パネル -->
  <rect x="4" y="20" width="2" height="8" rx="1" fill="#44bbff" opacity="0.3"/>
  <rect x="42" y="20" width="2" height="8" rx="1" fill="#44bbff" opacity="0.3"/>
  <!-- 共鳴ライン -->
  <line x1="10" y1="24" x2="6" y2="24" stroke="#44bbff" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="24" x2="42" y2="24" stroke="#44bbff" stroke-width="1.5" opacity="0.6"/>
</svg>
