<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sniper Lv4: サイドアーマー強化+ダブルスコープ -->
  <!-- メインバレル（長い） -->
  <rect x="21" y="2" width="5" height="22" rx="1" fill="#661122" stroke="#ff4466" stroke-width="1.2"/>
  <rect x="20" y="2" width="7" height="3.5" rx="1" fill="#ff4466"/>
  <!-- サブバレル -->
  <rect x="16" y="6" width="2.5" height="12" rx="0.6" fill="#551020" stroke="#ff4466" stroke-width="0.6" opacity="0.7"/>
  <rect x="30" y="6" width="2.5" height="12" rx="0.6" fill="#551020" stroke="#ff4466" stroke-width="0.6" opacity="0.7"/>
  <!-- 船体（大き目） -->
  <path d="M16 22 L32 22 L36 32 L34 44 L14 44 L12 32 Z" fill="#331122" stroke="#ff4466" stroke-width="2"/>
  <!-- フルサイドアーマー -->
  <path d="M12 26 L6 30 L6 40 L12 42 Z" fill="#441528" stroke="#ff4466" stroke-width="1"/>
  <path d="M36 26 L42 30 L42 40 L36 42 Z" fill="#441528" stroke="#ff4466" stroke-width="1"/>
  <!-- 追加プレート -->
  <path d="M14 28 L12 30 L12 34 L14 32 Z" fill="#552030" stroke="#ff4466" stroke-width="0.5"/>
  <path d="M34 28 L36 30 L36 34 L34 32 Z" fill="#552030" stroke="#ff4466" stroke-width="0.5"/>
  <!-- ダブルスコープ -->
  <circle cx="24" cy="32" r="6" fill="#220a10" stroke="#ff4466" stroke-width="1.8"/>
  <circle cx="24" cy="32" r="4" fill="none" stroke="#ff4466" stroke-width="0.6" opacity="0.5"/>
  <circle cx="24" cy="32" r="2.5" fill="#ff4466" opacity="0.5"/>
  <circle cx="24" cy="32" r="1" fill="#ffaabb"/>
  <!-- 精密十字線 -->
  <line x1="24" y1="26" x2="24" y2="38" stroke="#ff4466" stroke-width="0.6" opacity="0.8"/>
  <line x1="18" y1="32" x2="30" y2="32" stroke="#ff4466" stroke-width="0.6" opacity="0.8"/>
  <!-- エンジン排気 -->
  <rect x="18" y="44" width="5" height="3" rx="1" fill="#ff4466" opacity="0.6"/>
  <rect x="25" y="44" width="5" height="3" rx="1" fill="#ff4466" opacity="0.6"/>
</svg>
