<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sniper Lv5: 究極砲塔 - トリプルバレル+フルアーマー -->
  <!-- 外殻リング -->
  <circle cx="24" cy="28" r="20" fill="none" stroke="#ff4466" stroke-width="0.6" opacity="0.25"/>
  <!-- メインバレル（最長） -->
  <rect x="21" y="0" width="6" height="24" rx="1.5" fill="#661122" stroke="#ff4466" stroke-width="1.5"/>
  <rect x="19" y="0" width="10" height="5" rx="1.5" fill="#ff4466"/>
  <rect x="22" y="0" width="4" height="2" fill="#ff8899"/>
  <!-- サイドバレル -->
  <rect x="14" y="3" width="3" height="16" rx="0.8" fill="#551020" stroke="#ff4466" stroke-width="1"/>
  <rect x="31" y="3" width="3" height="16" rx="0.8" fill="#551020" stroke="#ff4466" stroke-width="1"/>
  <rect x="13" y="2" width="5" height="3" rx="1" fill="#ff4466" opacity="0.8"/>
  <rect x="30" y="2" width="5" height="3" rx="1" fill="#ff4466" opacity="0.8"/>
  <!-- 船体（最大強化） -->
  <path d="M14 22 L34 22 L38 32 L36 44 L12 44 L10 32 Z" fill="#331122" stroke="#ff4466" stroke-width="2.5"/>
  <!-- フルサイドアーマー -->
  <path d="M10 24 L2 28 L2 40 L10 42 Z" fill="#441528" stroke="#ff4466" stroke-width="1.2"/>
  <path d="M38 24 L46 28 L46 40 L38 42 Z" fill="#441528" stroke="#ff4466" stroke-width="1.2"/>
  <!-- 追加装甲プレート -->
  <path d="M14 26 L10 28 L10 32 L14 30 Z" fill="#552030" stroke="#ff4466" stroke-width="0.6"/>
  <path d="M34 26 L38 28 L38 32 L34 30 Z" fill="#552030" stroke="#ff4466" stroke-width="0.6"/>
  <!-- 高精度スコープ（三重リング） -->
  <circle cx="24" cy="32" r="7" fill="#220a10" stroke="#ff4466" stroke-width="2"/>
  <circle cx="24" cy="32" r="5" fill="none" stroke="#ff4466" stroke-width="0.8" opacity="0.6"/>
  <circle cx="24" cy="32" r="3" fill="#ff4466" opacity="0.5"/>
  <circle cx="24" cy="32" r="1.5" fill="#ffaabb"/>
  <!-- 精密十字線 -->
  <line x1="24" y1="25" x2="24" y2="39" stroke="#ff4466" stroke-width="0.8"/>
  <line x1="17" y1="32" x2="31" y2="32" stroke="#ff4466" stroke-width="0.8"/>
  <line x1="20" y1="28" x2="28" y2="36" stroke="#ff4466" stroke-width="0.4" opacity="0.5"/>
  <line x1="28" y1="28" x2="20" y2="36" stroke="#ff4466" stroke-width="0.4" opacity="0.5"/>
  <!-- エンジン排気（三連） -->
  <rect x="15" y="44" width="4" height="3" rx="1" fill="#ff4466" opacity="0.8"/>
  <rect x="22" y="44" width="4" height="3" rx="1" fill="#ff4466" opacity="0.6"/>
  <rect x="29" y="44" width="4" height="3" rx="1" fill="#ff4466" opacity="0.8"/>
</svg>
